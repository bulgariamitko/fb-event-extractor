<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 520px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #e4e6eb;
      background: #18191a;
    }

    .header {
      padding: 12px 16px;
      border-bottom: 1px solid #3e4042;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }

    .input-section {
      padding: 12px 16px;
    }

    .input-section label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #b0b3b8;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 8px 10px;
      border: 1px solid #3e4042;
      border-radius: 6px;
      background: #242526;
      color: #e4e6eb;
      font-family: monospace;
      font-size: 12px;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: #2d88ff;
    }

    textarea::placeholder {
      color: #65676b;
    }

    .controls {
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #extractBtn {
      background: #2d88ff;
      color: #fff;
    }

    #extractBtn:hover { background: #1a77f2; }
    #extractBtn:disabled { background: #3e4042; color: #65676b; cursor: not-allowed; }

    #clearBtn {
      background: #3a3b3c;
      color: #e4e6eb;
    }

    #clearBtn:hover { background: #4e4f50; }

    #copyBtn {
      background: #3a3b3c;
      color: #e4e6eb;
      margin-left: auto;
      display: none;
    }

    #copyBtn:hover { background: #4e4f50; }

    .status {
      padding: 4px 16px 8px;
      font-size: 12px;
      color: #b0b3b8;
    }

    .status .count { color: #2d88ff; font-weight: 600; }
    .status .skipped { color: #f5a623; }
    .status .error { color: #f02849; }

    .progress-bar {
      height: 3px;
      background: #3e4042;
      display: none;
    }

    .progress-bar .fill {
      height: 100%;
      background: #2d88ff;
      width: 0%;
      transition: width 0.3s;
    }

    .results {
      padding: 0 16px 16px;
      max-height: 400px;
      overflow-y: auto;
    }

    .event-card {
      background: #242526;
      border: 1px solid #3e4042;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .event-card .cover {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
      background: #3a3b3c;
    }

    .event-card .info {
      padding: 10px 12px;
    }

    .event-card .date {
      font-size: 12px;
      color: #2d88ff;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .event-card .title {
      font-size: 14px;
      font-weight: 600;
      color: #e4e6eb;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .event-card .location {
      font-size: 12px;
      color: #b0b3b8;
      margin-bottom: 6px;
    }

    .event-card .desc {
      font-size: 12px;
      color: #b0b3b8;
      line-height: 1.4;
      max-height: 60px;
      overflow: hidden;
    }

    .event-card .link {
      padding: 6px 12px;
      border-top: 1px solid #3e4042;
      font-size: 11px;
    }

    .event-card .link a {
      color: #2d88ff;
      text-decoration: none;
    }

    .event-card .link a:hover { text-decoration: underline; }

    .event-card.error-card {
      border-color: #f02849;
    }

    .event-card.error-card .info {
      color: #f02849;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3e4042; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4e4f50; }
  </style>
</head>
<body>
  <div class="header">
    <h1>FB Event Extractor</h1>
  </div>

  <div class="input-section">
    <label>Paste Facebook event URLs (one per line)</label>
    <textarea id="urlInput" placeholder="https://www.facebook.com/events/1234567890/
https://www.facebook.com/events/0987654321/
..."></textarea>
  </div>

  <div class="controls">
    <button id="extractBtn">Extract Events</button>
    <button id="clearBtn">Clear</button>
    <button id="copyBtn">Copy JSON</button>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="fill" id="progressFill"></div>
  </div>

  <div class="status" id="status"></div>

  <div class="results" id="results"></div>

  <script src="popup.js"></script>
</body>
</html>
